name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Format check
        run: black --check . --line-length 100 --exclude="notebooks/"
      - name: Lint check
        run: flake8 . --max-line-length=100 --exclude=.git,__pycache__,notebooks
      - name: Run tests
        run: pytest tests/ -v --tb=short --color=yes
